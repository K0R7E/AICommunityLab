<div class="browse-tools">
  <div class="browse-tools__copy">
    <h2 class="browse-tools__title">Browse tools</h2>
    <p class="browse-tools__lead">Filter the directory by category.</p>
  </div>
  <mat-form-field appearance="outline" class="browse-tools__field" subscriptSizing="dynamic">
    <mat-label>Category</mat-label>
    <mat-select
      [value]="selected"
      (selectionChange)="onSelect($event)"
      aria-label="Filter tools by category"
    >
      <mat-option [value]="null">All categories</mat-option>
      @for (c of categories(); track c.id) {
        <mat-option [value]="c.id">{{ c.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
