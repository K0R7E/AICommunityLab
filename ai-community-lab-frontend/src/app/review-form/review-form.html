<h2 mat-dialog-title class="tw-m-0 tw-text-lg tw-font-semibold">Write a review</h2>

<mat-dialog-content class="tw-pt-2">
  <p class="tw-m-0 tw-mb-3 tw-text-sm tw-text-slate-600">
    Reviews are anonymous. Optionally add a display name (defaults to “Anonymous”).
  </p>

  <mat-form-field appearance="outline" class="tw-w-full" subscriptSizing="dynamic">
    <mat-label>Display name (optional)</mat-label>
    <input matInput name="authorName" [(ngModel)]="authorName" placeholder="Anonymous" maxlength="255" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="tw-mt-2 tw-w-full" subscriptSizing="dynamic">
    <mat-label>Your review</mat-label>
    <textarea
      matInput
      name="reviewText"
      rows="5"
      [(ngModel)]="text"
      placeholder="What worked well? What would you improve?"
    ></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" class="tw-pb-4">
  <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="submitting" (click)="submit()">
    {{ submitting ? 'Submitting…' : 'Submit review' }}
  </button>
</mat-dialog-actions>
