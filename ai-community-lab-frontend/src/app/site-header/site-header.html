<header
  class="site-header tw-sticky tw-top-0 tw-z-[100] tw-border-b tw-border-transparent tw-bg-white/85 tw-backdrop-blur-md tw-transition-[box-shadow,border-color,background-color] tw-duration-200"
  [class.is-scrolled]="scrolled() || compactNav()"
>
  <div class="app-shell header-inner tw-flex tw-min-h-[72px] tw-items-center tw-gap-3 tw-py-2">
    <a
      routerLink="/"
      class="tw-mr-auto tw-flex tw-items-center tw-rounded-lg tw-outline-offset-4 focus-visible:tw-outline focus-visible:tw-outline-2 focus-visible:tw-outline-[var(--mat-sys-primary)]"
      aria-label="AI Community Lab — home"
    >
      <img
        class="brand-logo tw-h-12 tw-w-auto max-md:tw-h-10"
        src="/logo.png"
        width="400"
        height="112"
        alt="AI Community Lab"
      />
    </a>

    <nav class="tw-hidden tw-items-center tw-gap-1 md:tw-flex" aria-label="Primary">
      @if (!compactNav()) {
        <button mat-button type="button" class="nav-link" routerLink="/" fragment="why-us">Why us</button>
        <button mat-button type="button" class="nav-link" routerLink="/" fragment="featured-tools">Tools</button>
        <button mat-button type="button" class="nav-link" routerLink="/" fragment="how-it-works">How it works</button>
        <button mat-button type="button" class="nav-link nav-link--cta" routerLink="/" fragment="join-community">
          Join
        </button>
      } @else {
        <a mat-button routerLink="/" fragment="featured-tools">All tools</a>
      }
    </nav>

    <button
      mat-icon-button
      type="button"
      class="md:tw-hidden"
      [matMenuTriggerFor]="mobileNav"
      aria-label="Open navigation menu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #mobileNav="matMenu">
      @if (!compactNav()) {
        <a mat-menu-item routerLink="/" fragment="why-us">Why us</a>
        <a mat-menu-item routerLink="/" fragment="featured-tools">Tools</a>
        <a mat-menu-item routerLink="/" fragment="how-it-works">How it works</a>
        <a mat-menu-item routerLink="/" fragment="join-community">Join</a>
      } @else {
        <a mat-menu-item routerLink="/" fragment="featured-tools">All tools</a>
      }
    </mat-menu>
  </div>
</header>
