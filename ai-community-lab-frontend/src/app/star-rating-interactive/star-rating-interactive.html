<div
  class="tw-inline-flex tw-items-center tw-gap-0.5"
  role="radiogroup"
  [attr.aria-labelledby]="labelledBy() ?? null"
  [attr.aria-disabled]="disabled()"
  aria-label="Star rating"
>
  @for (n of [1, 2, 3, 4, 5]; track n) {
    <button
      mat-icon-button
      type="button"
      class="star-btn"
      [disabled]="disabled()"
      [class.is-selected]="value() !== null && n <= (value() ?? 0)"
      [attr.aria-checked]="value() === n"
      role="radio"
      [attr.aria-label]="n + ' star' + (n > 1 ? 's' : '')"
      (click)="setStar(n, $event)"
      (keydown)="onKeydown($event, n)"
    >
      <mat-icon>{{ value() !== null && n <= (value() ?? 0) ? 'star' : 'star_border' }}</mat-icon>
    </button>
  }
</div>
