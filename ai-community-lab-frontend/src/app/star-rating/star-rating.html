<span
  class="star-rating"
  role="img"
  [attr.aria-label]="rating() + ' out of ' + max() + ' stars'"
>
  @for (kind of sequence(); track $index) {
    @if (kind === 'full') {
      <mat-icon class="star full">star</mat-icon>
    } @else if (kind === 'half') {
      <mat-icon class="star half">star_half</mat-icon>
    } @else {
      <mat-icon class="star empty">star_border</mat-icon>
    }
  }
</span>
