<div class="rating-blocks">
  <section
    class="rating-card rating-card--community"
    aria-labelledby="tool-rating-heading"
  >
    <h2 id="tool-rating-heading" class="rating-card__title">Community rating</h2>
    <p class="rating-card__lead">
      Average from anonymous star ratings for this tool. No account required.
    </p>

    @if (loading()) {
      <p class="rating-card__status">Loading…</p>
    } @else {
      <div class="rating-card__community-row">
        <app-star-rating [rating]="average()" [max]="5" />
        <span class="rating-card__avg">{{ average() | number: '1.1-1' }}</span>
        <span class="rating-card__count">({{ count() }} rating{{ count() === 1 ? '' : 's' }})</span>
      </div>
    }
  </section>

  <section class="rating-card rating-card--yours" aria-labelledby="your-rating-heading">
    <h2 id="your-rating-heading" class="rating-card__title">Your rating</h2>
    <p class="rating-card__lead">Tap a star to choose, then submit.</p>

    <div class="rating-card__yours-row">
      <app-star-rating-interactive [(value)]="draftStars" [disabled]="submitting()" labelledBy="your-rating-heading" />
      <button
        mat-flat-button
        color="primary"
        class="rating-card__submit"
        type="button"
        [disabled]="submitting()"
        (click)="submitRating()"
      >
        Submit rating
      </button>
    </div>
  </section>
</div>
