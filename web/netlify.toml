# Netlify build – Angular app (base directory = web/)
# UI-ban állítsd a site „Base directory” mezőjét: web

[build]
  command = "npm run build"
  publish = "dist/ai-community-lab/browser"

# Angular Router (SPA): minden útvonal → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
